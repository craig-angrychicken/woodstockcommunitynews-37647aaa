name: Pipeline Monitor — Daily Report

on:
  schedule:
    - cron: '37 23 * * *'  # 7:37pm ET — daily report
  workflow_dispatch:
    inputs:
      force_report:
        description: 'Force executive briefing email'
        type: boolean
        default: true

jobs:
  daily-report:
    name: AI Daily Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run pipeline monitor agent (daily report)
        run: node scripts/agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_REPORT: ${{ github.event.inputs.force_report || 'true' }}
