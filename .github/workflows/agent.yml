name: Pipeline Monitor Agent

on:
  schedule:
    - cron: '23 10 * * *'   # 6:23am ET  — monitoring
    - cron: '47 17 * * *'   # 1:47pm ET  — monitoring
    - cron: '52 0 * * *'    # 8:52pm ET  — monitoring
  workflow_dispatch:

jobs:
  monitor:
    name: AI Pipeline Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run pipeline monitor agent
        run: node scripts/agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_REPORT: 'false'
