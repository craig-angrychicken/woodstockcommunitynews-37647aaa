name: Pipeline Monitor Agent

on:
  schedule:
    - cron: '0 3 * * *'    # 10pm ET — daily report
    - cron: '0 11 * * *'   # 6am ET  — monitoring
    - cron: '0 17 * * *'   # 12pm ET — monitoring
    - cron: '0 23 * * *'   # 6pm ET  — monitoring
  workflow_dispatch:
    inputs:
      force_report:
        description: 'Force executive briefing email'
        type: boolean
        default: false

jobs:
  monitor:
    name: AI Pipeline Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run pipeline monitor agent
        run: node scripts/agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          QUEUE_PROCESSOR_SECRET: ${{ secrets.QUEUE_PROCESSOR_SECRET }}
          FORCE_REPORT: ${{ github.event.inputs.force_report || 'false' }}
